services:
  my-services:
    image: nginx:1.29.5-v1
    build:
      context: ./app/nginx  
      dockerfile: nginx     
    container_name: my-nginx
    ports:
      - "80:80"
    volumes:
      - nginx-logs:/var/log/nginx
    networks:
      - public-subnet
      - private-subnet

networks:
  public-subnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
          ip_range: 10.0.0.0/24
          gateway: 10.0.0.1
  private-subnet:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.0.1.0/24
          ip_range: 10.0.1.0/24

# 로그 보관을 위한 볼륨 정의 (NFS)
volumes:
  nginx-logs: # 볼륨 이름 정의 : 도커볼륨, 도커 볼륨은 도커가 볼륨을 관리, /var/lib/docker/volumes/
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/home/sy/DATA/ex/nginx/logs"