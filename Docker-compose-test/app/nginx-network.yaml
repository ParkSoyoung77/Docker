services:
  my-services:
    image: nginx:1.29.5-v1
    build:
      context: ./app/nginx  
      dockerfile: nginx     
    container_name: my-nginx
    ports:
      - "80:80"
    volumes:
      - ~/DATA/nginx/logs:/var/log/nginx
    networks:
      - public-subnet
      - private-subnet

networks:
  public-subnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
          ip_range: 10.0.0.0/24
          gateway: 10.0.0.1
  private-subnet:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.0.1.0/24
          ip_range: 10.0.1.0/24
          gateway: 10.0.1.1