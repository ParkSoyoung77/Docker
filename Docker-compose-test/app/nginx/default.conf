charset utf-8;

server {
    listen 80;
    server_name _;  # ALB를 통해 들어오므로 모든 호스트 허용
    # 텍스트 파일로 저장될 로그 경로 지정
    access_log /var/log/nginx/my_access.log;
    error_log /var/log/nginx/my_error.log;
    # 클라이언트 실제 IP 및 프로토콜 전달 설정
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto; # ALB가 보낸 프로토콜(https)

    # 1. 기본 경로 (http://localhost) -> Nginx 컨테이너의 정적 파일 제공
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. 특정 경로 (http://localhost/app) -> FastAPI 컨테이너
    # location /app/ {
    #     # 'my-app' 컨테이너의 8000번 포트로 전달 (FastAPI 기본 포트 가정)
    #     # 끝에 '/'를 붙이면 요청된 경로에서 '/app/'을 제외하고 전달합니다.
    #     proxy_pass         http://my-app:8000/; 
        
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host $host;
    #     proxy_set_header   X-Real-IP $remote_addr;
    #     proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;

    #     # FastAPI(Uvicorn) 연결 시 타임아웃 방지
    #     proxy_read_timeout 90;
    #     proxy_connect_timeout 90;
    #     proxy_send_timeout 90;
    # }

    # 에러 페이지 설정
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

}